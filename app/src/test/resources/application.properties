# Test profile — keep the context self-contained (no external cloud calls).
# The Azure Key Vault / Storage auto-configuration backs off when no endpoint is
# configured; this flag makes that explicit for the Key Vault property source.
spring.cloud.azure.keyvault.secret.property-source-enabled=false

# The datasource is provided at runtime by the Testcontainers PostgreSQL container
# (see TestcontainersConfiguration), so nothing needs to be configured here.

# A syntactically valid project id is enough: NimbusJwtDecoder.withIssuerLocation is
# lazy, so no discovery request is made unless a token is actually decoded.
firebase.project-id=packing-test

# No Firebase credentials exist in CI. The Admin SDK is skipped and the
# FirebaseUserDirectory port falls back to its unavailable implementation.
firebase.admin-enabled=false
