# DB_HOST defaults to localhost for the usual `./gradlew :app:bootRun` loop against the
# Compose database. docker-compose.yml overrides it to `postgres`, since inside a
# container `localhost` is the container itself.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:packing}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Every value below is read through an explicit ${ENV_VAR} placeholder rather than relying
# on Spring's environment-variable binding, and that is deliberate. Relaxed binding maps
# an env var by uppercasing and DROPPING hyphens, so `firebase.project-id` would have to be
# set as FIREBASE_PROJECTID; the intuitive FIREBASE_PROJECT_ID maps to `firebase.project.id`
# and silently fails to bind. Naming the variable here removes the trap.

# Point at a real Firebase project; ID tokens minted by its clients then verify against
# the public JWKS with no further setup. Unset means a startup failure naming this
# property, which is clearer than a downstream 401.
firebase.project-id=${FIREBASE_PROJECT_ID:packing-3d-6a9e6}

# Optional: base64-encoded service-account JSON. Leave unset to fall back to Application
# Default Credentials (gcloud / GOOGLE_APPLICATION_CREDENTIALS).
firebase.service-account=${FIREBASE_SERVICE_ACCOUNT_B64:}

# Set FIREBASE_ADMIN_ENABLED=false to skip Admin SDK initialisation entirely when you have
# no credentials to hand. Token verification keeps working — it needs only the public
# JWKS — and only Firebase-side mutations (role assignment, account deletion) fail.
firebase.admin-enabled=${FIREBASE_ADMIN_ENABLED:true}
