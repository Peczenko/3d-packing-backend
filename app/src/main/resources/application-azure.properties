spring.cloud.azure.keyvault.secret.endpoint=https://packing-kv.vault.azure.net/
spring.cloud.azure.credential.managed-identity-enabled=true

spring.datasource.url=jdbc:postgresql://${db.endpoint}:${DB_PORT:5432}/${DB_NAME:packing}?sslmode=require
spring.datasource.username=${db.username}
spring.datasource.password=${db.password}

firebase.project-id=${firebase.project.id}
firebase.service-account=${firebase.service.account}

spring.cloud.azure.storage.blob.endpoint=${storage.blob.endpoint}

app.storage.sas-mode=USER_DELEGATION