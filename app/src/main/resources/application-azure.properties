spring.cloud.azure.keyvault.secret.endpoint=https://packing-kv.vault.azure.net/
spring.cloud.azure.credential.managed-identity-enabled=true

spring.datasource.url=jdbc:postgresql://${db.endpoint}:${DB_PORT:5432}/${DB_NAME:packing}?sslmode=require
spring.datasource.username=${db.username}
spring.datasource.password=${db.password}

# Firebase configuration, read from the same vault.
#
# The placeholder indirection is deliberate. Spring Cloud Azure's Key Vault property
# source resolves a requested property name by replacing "." with "-", so asking for
# `firebase.project.id` reads the secret `firebase-project-id`. That is the same
# Environment.getProperty() path the db.* settings above already use and are known to
# work on. Binding `firebase.project-id` directly would instead rely on the binder
# enumerating secret names, which maps `firebase-project-id` to `firebase.project.id`
# and does NOT relax-bind to a `projectId` record component.
#
# firebase-service-account holds the service-account JSON, base64-encoded (see
# docs/DEPLOYMENT.md section 6).
firebase.project-id=${firebase.project.id}
firebase.service-account=${firebase.service.account}
