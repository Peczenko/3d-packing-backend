spring.application.name=3d-packing-backend

spring.datasource.driver-class-name=org.postgresql.Driver

# Same as the Spring Boot default, but stated explicitly so the location is greppable:
# the migrations live in :infra, so at runtime Flyway must find them inside
# BOOT-INF/lib/infra-*.jar rather than in an exploded classes directory.
spring.flyway.locations=classpath:db/migration

spring.jooq.sql-dialect=POSTGRES

# `configprops` is deliberately NOT exposed: firebase.service-account does not match
# Spring Boot's default sanitisation key patterns and would be rendered in full.
management.endpoints.web.exposure.include=health,info

app.cors.allowed-origins=http://localhost:3000
