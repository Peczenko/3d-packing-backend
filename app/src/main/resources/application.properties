spring.application.name=3d-packing-backend

spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.locations=classpath:db/migration

spring.jooq.sql-dialect=POSTGRES

management.endpoints.web.exposure.include=health,info

app.cors.allowed-origins=http://localhost:3000

spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:105MB}
spring.servlet.multipart.file-size-threshold=1MB

app.storage.container-name=${STORAGE_CONTAINER_NAME:models}
app.storage.download-url-ttl=${STORAGE_DOWNLOAD_URL_TTL:5m}
