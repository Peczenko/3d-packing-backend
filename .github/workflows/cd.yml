name: CD

# On every push to master: build the image, push it to GHCR, then (once Azure is
# configured) deploy to Azure Container Apps. The deploy job stays skipped until
# the repository variable DEPLOY_ENABLED is set to "true".
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    name: Build & push image (GHCR)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      image: ${{ steps.img.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from build.gradle
        id: ver
        run: echo "version=$(grep -oP "^version\s*=\s*'\K[^']+" build.gradle | sed 's/-SNAPSHOT//')" >> "$GITHUB_OUTPUT"

      - name: Compute lowercase image name
        id: img
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ steps.ver.outputs.version }}
            ${{ steps.img.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure Container Apps
    needs: image
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update container app image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --image "${{ needs.image.outputs.image }}:${{ needs.image.outputs.version }}"
