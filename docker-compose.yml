name: packing-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: packing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-packing}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      # Override DB_PORT in .env if something already owns 5432 on your machine.
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-packing}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.31.0
    container_name: packing-azurite
    restart: unless-stopped
    command: "azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck"
    ports:
      - "${AZURITE_BLOB_PORT:-10000}:10000"
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    profiles: ["app"]
    build:
      context: .
    image: packing-backend:local
    container_name: packing-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-packing}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_B64: ${FIREBASE_SERVICE_ACCOUNT_B64:-}
      FIREBASE_ADMIN_ENABLED: ${FIREBASE_ADMIN_ENABLED:-false}
      # Inside the Compose network the emulator answers to its service name, not localhost.
      AZURITE_HOST: azurite
      AZURITE_BLOB_PORT: 10000
      STORAGE_CONTAINER_NAME: ${STORAGE_CONTAINER_NAME:-models}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres-data:
  azurite-data:
