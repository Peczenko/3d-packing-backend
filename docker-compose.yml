name: packing-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: packing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-packing}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      # Override DB_PORT in .env if something already owns 5432 on your machine.
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-packing}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  app:
    profiles: ["app"]
    build:
      context: .
    image: packing-backend:local
    container_name: packing-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-packing}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_B64: ${FIREBASE_SERVICE_ACCOUNT_B64:-}
      FIREBASE_ADMIN_ENABLED: ${FIREBASE_ADMIN_ENABLED:-false}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres-data:
